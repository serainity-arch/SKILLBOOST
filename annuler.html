<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annulation — SkillBoost Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-3xl border border-slate-200 shadow-xl p-10 max-w-md w-full text-center">

    <div class="text-xl font-extrabold tracking-tighter uppercase italic mb-8">
      SKILLBOOST<span class="text-blue-600">.ACADEMY</span>
    </div>

    <!-- État : chargement -->
    <div id="loading">
      <div class="text-4xl mb-4">⏳</div>
      <p class="text-slate-600 font-medium">Annulation en cours...</p>
    </div>

    <!-- État : succès -->
    <div id="success" class="hidden">
      <div class="text-4xl mb-4">✅</div>
      <h1 class="text-2xl font-extrabold text-slate-900 mb-3">Inscription annulée</h1>
      <p class="text-slate-500 text-sm leading-relaxed">
        Votre inscription a bien été annulée. Un email de confirmation vous a été envoyé.
      </p>
      <a href="/" class="mt-8 inline-block bg-slate-900 text-white font-bold px-6 py-3 rounded-xl text-sm uppercase tracking-widest hover:bg-slate-700 transition-all">
        Retour au site
      </a>
    </div>

    <!-- État : erreur -->
    <div id="error" class="hidden">
      <div class="text-4xl mb-4">⚠️</div>
      <h1 class="text-2xl font-extrabold text-slate-900 mb-3">Une erreur est survenue</h1>
      <p class="text-slate-500 text-sm leading-relaxed">
        Impossible de traiter votre annulation. Veuillez réessayer ou contacter le support.
      </p>
      <a href="/" class="mt-8 inline-block bg-slate-900 text-white font-bold px-6 py-3 rounded-xl text-sm uppercase tracking-widest hover:bg-slate-700 transition-all">
        Retour au site
      </a>
    </div>

  </div>

  <script>
    const WEBHOOK_ANNULATION = 'https://n8n.srv1515192.hstgr.cloud/webhook/annulation_skillboost';

    async function annuler() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');
      const atelier = params.get('atelier');
      const format = params.get('format');

      if (!email || !atelier || !format) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      try {
        const url = `${WEBHOOK_ANNULATION}?email=${encodeURIComponent(email)}&atelier=${encodeURIComponent(atelier)}&format=${encodeURIComponent(format)}`;
        const response = await fetch(url);

        document.getElementById('loading').classList.add('hidden');

        if (response.ok) {
          document.getElementById('success').classList.remove('hidden');
        } else {
          document.getElementById('error').classList.remove('hidden');
        }
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }

    window.addEventListener('DOMContentLoaded', annuler);
  </script>

</body>
</html>
